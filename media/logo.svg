<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" stroke="#334155" stroke-width="2"/>
  <!-- Laptop base (keyboard) -->
  <rect x="70" y="220" width="260" height="30" rx="6" fill="url(#accent)" opacity="0.9"/>
  <!-- Laptop lid (screen, slightly angled) -->
  <path d="M75 220 L75 120 Q75 90 105 90 L295 90 Q325 90 325 120 L325 220" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Screen content - line representing code/settings -->
  <line x1="120" y1="130" x2="200" y2="130" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="150" x2="280" y2="150" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="170" x2="250" y2="170" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="190" x2="220" y2="190" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <!-- Lid close indicator - arrow pointing down to lid -->
  <path d="M200 60 L200 30" stroke="#f87171" stroke-width="5" stroke-linecap="round"/>
  <path d="M185 45 L200 30 L215 45" stroke="#f87171" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Toggle symbol on lid -->
  <circle cx="200" cy="105" r="8" fill="none" stroke="#10b981" stroke-width="3"/>
  <circle cx="204" cy="105" r="4" fill="#10b981"/>
</svg>
